    --bg-body: #f1f5f9;
    --bg-header: #ffffff;
    --border-color: #cbd5e1;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --input-bg: #f8fafc;
    --legend-bg: rgba(255,255,255,0.95);
    --hover-bg: rgba(0,0,0,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; }
  
  #header { padding: 10px 16px; background: var(--bg-header); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; transition: background 0.3s, border-color 0.3s; }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--text-main); flex: 1; min-width: 200px; }
  
  #search {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 13px;
    outline: none;
    min-width: 250px;
    transition: all 0.2s;
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: #3b82f6; }

  /* Theme Toggle Button */
  #theme-toggle {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    color: var(--text-main);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  #theme-toggle:hover { background: var(--hover-bg); }

  #count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  #map { flex: 1; z-index: 1; }
  
  #legend { position: absolute; bottom: 24px; right: 10px; z-index: 1000; background: var(--legend-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; max-height: 70vh; overflow-y: auto; min-width: 200px; transition: background 0.3s, border-color 0.3s; }
  #legend h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .legend-item:hover { background: var(--hover-bg); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(100,100,100,0.3); }
  .legend-label { font-size: 11px; color: var(--text-main); }
  .legend-count { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  
  /* Popup Styles */
  .leaflet-popup-content-wrapper { background: var(--bg-header); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; }
  .leaflet-popup-tip { background: var(--bg-header); border: 1px solid var(--border-color); border-top: none; border-left: none; }
  .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-family { font-size: 11px; padding: 2px 8px; border-radius: 12px; display: inline-block; margin-bottom: 6px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .popup-row { font-size: 11px; color: var(--text-muted); margin: 2px 0; }
  .popup-row span { color: var(--text-main); }
</style>

// Build legend
const legendEl = document.getElementById('legend-items');
const familyCounts = {};
languages.forEach(l => { familyCounts[l.family] = (familyCounts[l.family]||0)+1; });
Object.keys(FAMILIES).forEach(fam => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:${FAMILIES[fam]}"></div><span class="legend-label">${fam}</span><span class="legend-count">${familyCounts[fam]||0}</span>`;
  legendEl.appendChild(div);
});

// Init map with layers
const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
});

const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
});

const map = L.map('map', {
  center: [-3, 125],
  zoom: 5,
  preferCanvas: true,
  layers: [darkTiles] // Default layer
});

// Marker Layer Group
const markerLayer = L.layerGroup().addTo(map);

// Render markers
function renderMarkers(dataToRender) {
  markerLayer.clearLayers();
  dataToRender.forEach(lang => {
    const color = FAMILIES[lang.family] || '#aaa';
    const marker = L.circleMarker([lang.lat, lang.lng], {
      radius: 5,
      fillColor: color,
      color: 'rgba(120,120,120,0.5)',
      weight: 1,
      fillOpacity: 0.85
    }).addTo(markerLayer);

    marker.bindPopup(`
      <div class="popup-title">${lang.name}</div>
      <div class="popup-family" style="background:${color}88; border:1px solid ${color}">${lang.family}</div>
      <div class="popup-row">ISO 639-3: <span>${lang.iso}</span></div>
      <div class="popup-row">Coordinates: <span>${lang.lat.toFixed(2)}, ${lang.lng.toFixed(2)}</span></div>
    `, {maxWidth: 220});
    
    marker.on('mouseover', function() { this.openPopup(); });
  });
  document.getElementById('count').textContent = `${dataToRender.length} languages displayed`;
}

renderMarkers(languages);

// Search functionality
document.getElementById('search').addEventListener('input', function(e) {
  const searchTerm = e.target.value.toLowerCase();
  const filteredLanguages = languages.filter(lang => 
    lang.name.toLowerCase().includes(searchTerm) || 
    lang.family.toLowerCase().includes(searchTerm) || 
    lang.iso.toLowerCase().includes(searchTerm)
  );
  renderMarkers(filteredLanguages);
});

// Theme Toggle Logic
const toggleBtn = document.getElementById('theme-toggle');
toggleBtn.addEventListener('click', () => {
  const body = document.body;
  body.classList.toggle('light-mode');
  
  if (body.classList.contains('light-mode')) {
    map.removeLayer(darkTiles);
    map.addLayer(lightTiles);
    toggleBtn.textContent = '☾ Dark Mode';
  } else {
    map.removeLayer(lightTiles);
    map.addLayer(darkTiles);
    toggleBtn.textContent = '☀ Light Mode';
  }
});
